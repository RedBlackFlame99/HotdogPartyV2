<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Games - Hotdog Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0e27;
            --secondary: #1a1f3a;
            --accent: #ff8c00;
            --accent-dark: #e67e00;
            --text: #ffffff;
            --text-dim: #a0a8c0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #1a0f35 50%, var(--secondary) 100%);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #1a0f35 50%, var(--secondary) 100%);
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(80px);
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.15) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
            bottom: -50px;
            left: 5%;
            animation: float 10s ease-in-out infinite reverse;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
            top: 50%;
            right: 5%;
            animation: float 9s ease-in-out infinite;
        }

        .floating-square {
            position: fixed;
            background: linear-gradient(135deg, rgba(139, 90, 43, 0.25), rgba(168, 85, 247, 0.15));
            pointer-events: none;
            border-radius: 12px;
            border: 1px solid rgba(255, 140, 0, 0.1);
            backdrop-filter: blur(10px);
            z-index: 1;
        }

        .square-1 {
            width: 80px;
            height: 80px;
            animation: float-square 6s ease-in-out infinite, rotate 8s linear infinite;
        }

        .square-2 {
            width: 100px;
            height: 100px;
            animation: float-square 7s ease-in-out infinite reverse, rotate 10s linear infinite reverse;
        }

        .square-3 {
            width: 70px;
            height: 70px;
            animation: float-square 8s ease-in-out infinite, rotate 12s linear infinite;
        }

        .square-4 {
            width: 90px;
            height: 90px;
            animation: float-square 7.5s ease-in-out infinite reverse, rotate 9s linear infinite reverse;
        }

        .square-5 {
            width: 85px;
            height: 85px;
            animation: float-square 6.5s ease-in-out infinite, rotate 11s linear infinite;
        }

        .square-6 {
            width: 75px;
            height: 75px;
            animation: float-square 7s ease-in-out infinite, rotate 8.5s linear infinite reverse;
        }

        /* Browse Games Section */
        .browse-section {
            padding: 4rem 5%;
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .games-carousel {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
            padding: 1rem 0;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .game-card {
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.15) 0%, rgba(168, 85, 247, 0.1) 100%);
        }

        .game-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
            pointer-events: none;
            z-index: 1;
        }

        .game-icon {
            font-size: 4rem;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            transition: all 0.3s ease;
        }

        .game-card:hover .game-icon {
            transform: scale(1.05);
        }

        .game-icon img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .game-name-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.7) 40%, transparent 100%);
            padding: 2rem 1rem 1rem 1rem;
            z-index: 3;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: 80px;
        }

        .game-card:hover .game-name-overlay {
            opacity: 1;
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 50px rgba(255, 140, 0, 0.3);
        }

        .game-name {
            font-family: 'Luckiest Guy', cursive;
            font-size: 1rem;
            color: var(--accent);
            line-height: 1.2;
            text-align: center;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--text-dim);
        }

        .error-message {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            max-width: 500px;
            margin: 0 auto;
        }

        /* Animations */
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(40px);
            }
        }

        @keyframes float-square {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(50px);
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .games-carousel {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 1.2rem;
            }

            .game-icon {
                font-size: 2.5rem;
            }

            .game-name {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="background-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- Floating Squares Container -->
    <div id="squares-container"></div>

    <!-- Browse Games Section -->
    <section class="browse-section">
        <div class="games-carousel" id="games-container">
            <div class="loading">Loading games...</div>
        </div>
    </section>

    <script>
        // Load games from JSON
        async function loadGames() {
            try {
                const response = await fetch('games.json');
                const games = await response.json();
                renderGames(games);
            } catch (error) {
                console.error('Error loading games:', error);
                document.getElementById('games-container').innerHTML = '<div class="error-message">Error loading games. Please try again later.</div>';
            }
        }

        function renderGames(games) {
            const container = document.getElementById('games-container');
            container.innerHTML = '';

            games.forEach(game => {
                const card = document.createElement('a');
                card.href = game.path;
                card.className = 'game-card';
                card.target = '_blank';

                const iconHTML = `
                    <div class="game-icon">
                        <img src="${game.icon}" alt="${game.name}" onerror="this.innerHTML='🎮'">
                    </div>
                `;

                card.innerHTML = `
                    ${iconHTML}
                    <div class="game-name-overlay">
                        <div class="game-name">${game.name}</div>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // Floating squares setup
        const squareSizes = [80, 100, 70, 90, 85, 75];
        const animationDurations = [
            { float: '6s', rotate: '8s', direction: 'normal' },
            { float: '7s', rotate: '10s', direction: 'reverse' },
            { float: '8s', rotate: '12s', direction: 'normal' },
            { float: '7.5s', rotate: '9s', direction: 'reverse' },
            { float: '6.5s', rotate: '11s', direction: 'normal' },
            { float: '7s', rotate: '8.5s', direction: 'reverse' }
        ];

        function getRandomPosition() {
            const randomTop = Math.random() * 100;
            const randomLeft = Math.random() * 100;
            return { top: randomTop, left: randomLeft };
        }

        function createFloatingSquares() {
            const container = document.getElementById('squares-container');
            
            squareSizes.forEach((size, index) => {
                const square = document.createElement('div');
                square.className = `floating-square square-${index + 1}`;
                
                const { top, left } = getRandomPosition();
                const duration = animationDurations[index];
                
                square.style.top = `${top}%`;
                square.style.left = `${left}%`;
                square.style.width = `${size}px`;
                square.style.height = `${size}px`;
                
                const floatDir = duration.direction === 'reverse' ? 'infinite reverse' : 'infinite';
                const rotateDir = duration.direction === 'reverse' ? 'infinite reverse' : 'infinite';
                
                square.style.animation = `float-square ${duration.float} ease-in-out ${floatDir}, rotate ${duration.rotate} linear ${rotateDir}`;
                
                container.appendChild(square);
            });
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', () => {
            createFloatingSquares();
            loadGames();
        });

        // Refresh squares every 30 seconds
        setInterval(() => {
            const container = document.getElementById('squares-container');
            const squares = container.querySelectorAll('.floating-square');
            
            squares.forEach((square) => {
                const { top, left } = getRandomPosition();
                square.style.top = `${top}%`;
                square.style.left = `${left}%`;
            });
        }, 30000);
    </script>
</body>
</html>
