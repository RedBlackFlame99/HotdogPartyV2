<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Player - Hotdog Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0e27;
            --secondary: #1a1f3a;
            --accent: #ff8c00;
            --accent-dark: #e67e00;
            --text: #ffffff;
            --text-dim: #a0a8c0;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #1a0f35 50%, var(--secondary) 100%);
            color: var(--text);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.fullscreen-mode {
            background: var(--primary);
        }

        /* Animated Background */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #1a0f35 50%, var(--secondary) 100%);
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        body.fullscreen-mode .background-animation {
            background: var(--primary);
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(80px);
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.15) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
            bottom: -50px;
            left: 5%;
            animation: float 10s ease-in-out infinite reverse;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
            top: 50%;
            right: 5%;
            animation: float 9s ease-in-out infinite;
        }

        .floating-square {
            position: fixed;
            background: linear-gradient(135deg, rgba(139, 90, 43, 0.25), rgba(168, 85, 247, 0.15));
            pointer-events: none;
            border-radius: 12px;
            border: 1px solid rgba(255, 140, 0, 0.1);
            backdrop-filter: blur(10px);
            z-index: 1;
        }

        .square-1 {
            width: 80px;
            height: 80px;
            animation: float-square 6s ease-in-out infinite, rotate 8s linear infinite;
        }

        .square-2 {
            width: 100px;
            height: 100px;
            animation: float-square 7s ease-in-out infinite reverse, rotate 10s linear infinite reverse;
        }

        .square-3 {
            width: 70px;
            height: 70px;
            animation: float-square 8s ease-in-out infinite, rotate 12s linear infinite;
        }

        .square-4 {
            width: 90px;
            height: 90px;
            animation: float-square 7.5s ease-in-out infinite reverse, rotate 9s linear infinite reverse;
        }

        .square-5 {
            width: 85px;
            height: 85px;
            animation: float-square 6.5s ease-in-out infinite, rotate 11s linear infinite;
        }

        .square-6 {
            width: 75px;
            height: 75px;
            animation: float-square 7s ease-in-out infinite, rotate 8.5s linear infinite reverse;
        }

        /* Main Container */
        .game-wrapper {
            display: flex;
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1600px;
            width: 100%;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        body.fullscreen-mode .game-wrapper {
            gap: 0;
            padding: 0;
            max-width: 100%;
        }

        /* Game Box */
        .game-box-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, rgba(26, 31, 58, 0.95), rgba(10, 14, 39, 0.95));
            border: 2px solid rgba(255, 140, 0, 0.2);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
        }

        body.fullscreen-mode .game-box-container {
            border: none;
            border-radius: 0;
            box-shadow: none;
            background: var(--primary);
            backdrop-filter: none;
        }

        /* Game Header */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 140, 0, 0.1);
            gap: 1rem;
        }

        body.fullscreen-mode .game-header {
            display: none;
        }

        .game-header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.1), rgba(255, 140, 0, 0.05));
            color: var(--text-dim);
            border: 1.5px solid rgba(255, 140, 0, 0.3);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.2), rgba(255, 140, 0, 0.1));
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.2);
        }

        .game-title {
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.3rem;
            background: linear-gradient(135deg, var(--accent) 0%, #ffb366 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .game-title-icon {
            font-size: 1.5rem;
        }

        .game-controls {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }

        .control-btn {
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.1), rgba(255, 140, 0, 0.05));
            color: var(--text-dim);
            border: 1.5px solid rgba(255, 140, 0, 0.3);
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.2), rgba(255, 140, 0, 0.1));
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.2);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        /* Game Content */
        .game-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #gameFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Quick Play Sidebar */
        .quick-play-sidebar {
            width: 280px;
            background: linear-gradient(135deg, rgba(26, 31, 58, 0.95), rgba(10, 14, 39, 0.95));
            border: 2px solid rgba(255, 140, 0, 0.2);
            border-radius: 16px;
            padding: 1.5rem;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
        }

        body.fullscreen-mode .quick-play-sidebar {
            display: none;
        }

        .quick-play-title {
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.1rem;
            color: var(--accent);
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .quick-play-games {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .quick-game-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0.8rem;
            border-radius: 10px;
            background: rgba(255, 140, 0, 0.05);
            border: 1px solid rgba(255, 140, 0, 0.1);
        }

        .quick-game-item:hover {
            background: rgba(255, 140, 0, 0.1);
            border-color: rgba(255, 140, 0, 0.3);
            transform: translateX(5px);
        }

        .quick-game-icon {
            width: 100%;
            height: 100px;
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.15), rgba(168, 85, 247, 0.1));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            overflow: hidden;
        }

        .quick-game-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .quick-game-name {
            font-family: 'Luckiest Guy', cursive;
            font-size: 0.9rem;
            color: var(--accent);
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Loading & Error Overlays */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 140, 0, 0.2);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            font-family: 'Luckiest Guy', cursive;
            color: var(--accent);
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .error-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            flex-direction: column;
            gap: 1.5rem;
            padding: 2rem;
        }

        .error-message {
            text-align: center;
        }

        .error-message h2 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.8rem;
            color: #ef4444;
            margin-bottom: 0.5rem;
        }

        .error-message p {
            color: var(--text-dim);
            font-size: 1rem;
        }

        /* Animations */
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(40px);
            }
        }

        @keyframes float-square {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(50px);
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Scrollbar */
        .quick-play-sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .quick-play-sidebar::-webkit-scrollbar-track {
            background: rgba(255, 140, 0, 0.05);
            border-radius: 10px;
        }

        .quick-play-sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 140, 0, 0.3);
            border-radius: 10px;
        }

        .quick-play-sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 140, 0, 0.5);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .game-wrapper {
                flex-direction: column;
                gap: 1rem;
            }

            .quick-play-sidebar {
                width: 100%;
                height: auto;
                max-height: 200px;
            }

            .quick-play-games {
                flex-direction: row;
                overflow-x: auto;
                padding-bottom: 0.5rem;
            }

            .quick-game-item {
                min-width: 120px;
                flex-shrink: 0;
            }
        }

        @media (max-width: 768px) {
            .game-wrapper {
                padding: 1rem;
                gap: 0.8rem;
            }

            .game-header {
                padding: 1rem;
                flex-wrap: wrap;
            }

            .game-title {
                font-size: 1.1rem;
            }

            .control-btn {
                padding: 0.4rem 0.6rem;
                font-size: 0.75rem;
            }

            .quick-play-sidebar {
                padding: 1rem;
            }

            .quick-play-title {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="background-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- Floating Squares Container -->
    <div id="squares-container"></div>

    <!-- Main Wrapper -->
    <div class="game-wrapper">
        <!-- Game Box -->
        <div class="game-box-container">
            <!-- Header -->
            <div class="game-header">
                <div class="game-header-left">
                    <a href="games.html" class="back-btn">← Back</a>
                    <div class="game-title">
                        <span class="game-title-icon">🎮</span>
                        <span id="gameTitle">Loading...</span>
                    </div>
                </div>
                <div class="game-controls">
                    <button class="control-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
                    <button class="control-btn" id="reloadBtn" title="Reload">🔄</button>
                </div>
            </div>

            <!-- Game Content -->
            <div class="game-content">
                <iframe id="gameFrame" sandbox="allow-same-origin allow-scripts allow-pointer-lock allow-popups allow-forms"></iframe>
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                        <div class="loading-text">LOADING GAME</div>
                    </div>
                </div>
                <div class="error-overlay" id="errorOverlay">
                    <div class="error-message">
                        <h2>⚠ Error Loading Game</h2>
                        <p>The game could not be loaded. Please try again.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Play Sidebar -->
        <div class="quick-play-sidebar">
            <div class="quick-play-title">⚡ QUICK PLAY</div>
            <div class="quick-play-games" id="quickPlayContainer">
                <!-- Games will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        const gameFrame = document.getElementById('gameFrame');
        const gameTitle = document.getElementById('gameTitle');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorOverlay = document.getElementById('errorOverlay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const reloadBtn = document.getElementById('reloadBtn');
        const gameBoxContainer = document.querySelector('.game-box-container');
        const gameWrapper = document.querySelector('.game-wrapper');
        const quickPlayContainer = document.getElementById('quickPlayContainer');

        let allGames = [];
        let isFullscreen = false;

        // Get game path from URL parameter
        function getGamePath() {
            const params = new URLSearchParams(window.location.search);
            return params.get('game');
        }

        function getGameName() {
            const params = new URLSearchParams(window.location.search);
            return params.get('name') || 'Game';
        }

        // Initialize game
        async function initGame() {
            const gamePath = getGamePath();
            const gameName = getGameName();
            
            if (!gamePath) {
                showError('No game specified');
                return;
            }

            gameTitle.textContent = gameName;
            document.title = `${gameName} - Hotdog Party`;

            // Load games for quick play
            await loadQuickPlayGames();

            // Load game
            gameFrame.src = gamePath;
        }

        // Load games for quick play sidebar
        async function loadQuickPlayGames() {
            try {
                const response = await fetch('games.json');
                allGames = await response.json();
                renderQuickPlayGames();
            } catch (error) {
                console.error('Error loading games:', error);
            }
        }

        // Render quick play games
        function renderQuickPlayGames() {
            quickPlayContainer.innerHTML = '';
            
            allGames.slice(0, 5).forEach(game => {
                const gameItem = document.createElement('div');
                gameItem.className = 'quick-game-item';
                gameItem.style.cursor = 'pointer';

                const iconHTML = `
                    <div class="quick-game-icon">
                        <img src="${game.icon}" alt="${game.name}" onerror="this.parentElement.innerHTML='🎮'" loading="lazy">
                    </div>
                `;

                gameItem.innerHTML = `
                    ${iconHTML}
                    <div class="quick-game-name">${game.name}</div>
                `;

                gameItem.addEventListener('click', () => {
                    window.location.href = `game.html?game=${encodeURIComponent(game.path)}&name=${encodeURIComponent(game.name)}`;
                });

                quickPlayContainer.appendChild(gameItem);
            });
        }

        // Hide loading overlay
        gameFrame.addEventListener('load', () => {
            loadingOverlay.style.display = 'none';
        });

        // Show error if frame fails to load
        gameFrame.addEventListener('error', () => {
            showError('Failed to load the game');
        });

        // Handle timeout
        setTimeout(() => {
            if (loadingOverlay.style.display !== 'none') {
                showError('Game took too long to load');
            }
        }, 10000);

        function showError(message) {
            loadingOverlay.style.display = 'none';
            errorOverlay.style.display = 'flex';
            errorOverlay.querySelector('p').textContent = message;
        }

        // Fullscreen button - fullscreen the entire game frame
        fullscreenBtn.addEventListener('click', () => {
            if (!isFullscreen) {
                gameFrame.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        // Handle fullscreen changes
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                isFullscreen = true;
                document.body.classList.add('fullscreen-mode');
                fullscreenBtn.textContent = '⛶ ✓';
            } else {
                isFullscreen = false;
                document.body.classList.remove('fullscreen-mode');
                fullscreenBtn.textContent = '⛶';
            }
        });

        // Reload button
        reloadBtn.addEventListener('click', () => {
            loadingOverlay.style.display = 'flex';
            errorOverlay.style.display = 'none';
            gameFrame.src = gameFrame.src;
        });

        // Floating squares setup
        const squareSizes = [80, 100, 70, 90, 85, 75];
        const animationDurations = [
            { float: '6s', rotate: '8s', direction: 'normal' },
            { float: '7s', rotate: '10s', direction: 'reverse' },
            { float: '8s', rotate: '12s', direction: 'normal' },
            { float: '7.5s', rotate: '9s', direction: 'reverse' },
            { float: '6.5s', rotate: '11s', direction: 'normal' },
            { float: '7s', rotate: '8.5s', direction: 'reverse' }
        ];

        function getRandomPosition() {
            const randomTop = Math.random() * 100;
            const randomLeft = Math.random() * 100;
            return { top: randomTop, left: randomLeft };
        }

        function createFloatingSquares() {
            const container = document.getElementById('squares-container');
            
            squareSizes.forEach((size, index) => {
                const square = document.createElement('div');
                square.className = `floating-square square-${index + 1}`;
                
                const { top, left } = getRandomPosition();
                const duration = animationDurations[index];
                
                square.style.top = `${top}%`;
                square.style.left = `${left}%`;
                square.style.width = `${size}px`;
                square.style.height = `${size}px`;
                
                const floatDir = duration.direction === 'reverse' ? 'infinite reverse' : 'infinite';
                const rotateDir = duration.direction === 'reverse' ? 'infinite reverse' : 'infinite';
                
                square.style.animation = `float-square ${duration.float} ease-in-out ${floatDir}, rotate ${duration.rotate} linear ${rotateDir}`;
                
                container.appendChild(square);
            });
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            createFloatingSquares();
            initGame();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'f' || e.key === 'F') {
                fullscreenBtn.click();
            } else if (e.key === 'r' || e.key === 'R') {
                reloadBtn.click();
            }
        });
    </script>
</body>
</html>
